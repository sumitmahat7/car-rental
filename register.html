<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarRentalPro - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .bg-register {
            background-image: url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-100">
    <div class="relative min-h-screen bg-register">
        <div class="absolute inset-0 bg-slate-950/70"></div>
        <div class="relative flex min-h-screen items-center justify-center px-6 py-12">
            <div class="w-full max-w-md rounded-[2rem] bg-white/95 p-10 shadow-2xl shadow-slate-900/10 backdrop-blur-xl">
                <div class="mb-8 text-center">
                    <a href="index.html" class="inline-flex items-center justify-center text-3xl font-bold text-slate-900">CarRentalPro</a>
                    <p class="mt-3 text-sm text-slate-600">Create your account to start booking cars instantly.</p>
                </div>
                <form id="register-form" class="space-y-6">
                    <div id="alert-message" class="hidden rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"></div>
                    <div>
                        <label for="full-name" class="block text-sm font-medium text-slate-700">Full Name</label>
                        <div class="mt-2">
                            <input id="full-name" name="fullName" type="text" required placeholder="John Doe"
                                class="w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-slate-900 shadow-sm transition focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200" />
                        </div>
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-medium text-slate-700">Email address</label>
                        <div class="mt-2">
                            <input id="email" name="email" type="email" required placeholder="you@example.com"
                                class="w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-slate-900 shadow-sm transition focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200" />
                        </div>
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
                        <div class="mt-2">
                            <input id="password" name="password" type="password" required placeholder="Create a password"
                                class="w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-slate-900 shadow-sm transition focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200" />
                        </div>
                    </div>
                    <div>
                        <label for="confirm-password" class="block text-sm font-medium text-slate-700">Confirm Password</label>
                        <div class="mt-2">
                            <input id="confirm-password" name="confirmPassword" type="password" required placeholder="Confirm your password"
                                class="w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-slate-900 shadow-sm transition focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200" />
                        </div>
                    </div>
                    <button type="submit"
                        class="w-full rounded-2xl bg-indigo-600 px-4 py-3 text-base font-semibold text-white shadow-lg shadow-indigo-500/20 transition hover:bg-indigo-700">Create Account</button>
                </form>
                <p class="mt-6 text-center text-sm text-slate-600">
                    Already registered? <a href="login.html" class="font-semibold text-indigo-600 hover:text-indigo-700">Sign in instead</a>
                </p>
            </div>
        </div>
    </div>
    <script>
        const form = document.getElementById('register-form');
        const alertBox = document.getElementById('alert-message');

        form.addEventListener('submit', event => {
            event.preventDefault();

            const fullName = document.getElementById('full-name').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (!fullName || !email || !password || !confirmPassword) {
                showAlert('Please fill in all fields.');
                return;
            }

            if (password !== confirmPassword) {
                showAlert('Passwords do not match.');
                return;
            }

            const user = {
                fullName,
                email,
                password
            };

            localStorage.setItem('carRentalUser', JSON.stringify(user));
            localStorage.removeItem('carRentalLoggedIn');

            alertBox.className = 'rounded-2xl border border-green-200 bg-green-50 px-4 py-3 text-sm text-green-700';
            alertBox.textContent = 'Registration successful! Redirecting to login...';
            alertBox.classList.remove('hidden');

            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1400);
        });

        function showAlert(message) {
            alertBox.className = 'rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700';
            alertBox.textContent = message;
            alertBox.classList.remove('hidden');
        }
    </script>
</body>
</html>
